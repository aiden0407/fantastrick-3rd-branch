<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>dlc-left</title>
  <script src="../jquery.min.js" type='text/javascript'></script>
  <link rel="stylesheet" href="../style.css" />

</head>

<body>
  <div id="overlay">연결이 끊겼습니다.</div>
  <div id="arduinoContainer"></div>

  <!-- 숨겨진 리셋 버튼 -->
  <div id="hiddenResetButton" style="position: fixed; top: 0; right: 0; width: 100px; height: 100px; cursor: pointer; z-index: 9999; -webkit-tap-highlight-color: transparent; user-select: none;"></div>

  <div id="section0"
    style="width:100%; height:100dvh; display: flex; justify-content: center; align-items: center; color: red; font-size: 40px;">
    정상적인 초기화를 위해 화면을 터치해 주세요
  </div>

  <div id="section1" style="width:100%; height:100dvh; display: none; justify-content: center; align-items: center;">
    <img class="blinking" src="./img/slot_pw.png" alt="POWER OFF" style="max-width: 90%; max-height: 90%;">
  </div>

  <div id="section2" style="width:100%; height:100dvh; display: none; justify-content: center; align-items: center;">
    <img id="slot_text1" src="./img/slot_text1.png" alt="slot_text1" style="max-width: 90%; max-height: 90%; display: none;">
    <img id="slot_text2" src="./img/slot_text2.png" alt="slot_text2" style="max-width: 90%; max-height: 90%; display: none;">
  </div>

  <div id="section3" style="width:100%; height:100dvh; display: none; justify-content: center; align-items: center; position: relative;">
    <img src="./img/slot_mainpage.png" alt="slot_mainpage" style="width: 100%; height: 100%; object-fit: cover;">

    <!-- 복원률 표시 -->
    <div id="recoveryRate" style="position: absolute; top: 31.5%; right: 45.5%; color: white; font-size: 190px; font-family: 'Pretendard', sans-serif; font-weight: bold;">0</div>

    <!-- 데이터 개수 표시 -->
    <div style="position: absolute; bottom: 24.1%; left: 49%; transform: translateX(-50%); display: flex; gap: 480px; color: white; font-size: 40px; font-family: 'Pretendard', sans-serif;">
      <div id="normalCount" style="width: 26px; text-align: end; color: yellow; font-weight: bold;">0</div>
      <div id="advancedCount" style="width: 26px; text-align: end; color: #0099FF; font-weight: bold;">0</div>
      <div id="premiumCount" style="width: 26px; text-align: end; color: red; font-weight: bold;">0</div>
    </div>

    <!-- 팝업 -->
    <div id="slotPopup" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 100;">
      <div style="position: relative; width: 60%;">
        <img src="./img/slot_popup.png" alt="popup" style="width: 100%;">
        <!-- Yes 버튼 영역 -->
        <div id="yesButton" style="position: absolute; bottom: 21%; left: 9%; width: 38%; height: 18%;"></div>
        <!-- No 버튼 영역 -->
        <div id="noButton" style="position: absolute; bottom: 21%; right: 10%; width: 38%; height: 18%;"></div>
      </div>
    </div>
  </div>

  <div id="section4" style="width:100%; height:100dvh; display: none; justify-content: center; align-items: center; position: relative;">
    <!-- 로딩 화면 -->
    <img id="loadingImage" src="./img/slot_loading.png" alt="loading" style="width: 100%; height: 100%; object-fit: cover; display: none;">

    <!-- 최종 화면 -->
    <div id="finalScreen" style="width: 100%; height: 100%; display: none; position: relative;">
      <img src="./img/slot_lastpage.png" alt="lastpage" style="width: 100%; height: 100%; object-fit: cover;">
      <!-- 점수 표시 -->
      <div id="finalScore" style="position: absolute; top: 63.4%; left: 50%; transform: translate(-50%, -50%); color: #7AEFED; font-size: 200px; font-family: 'Pretendard', sans-serif; font-weight: bold;">0 점</div>
    </div>
  </div>

  <div id="section5" style="width:100%; height:100dvh; display: none; justify-content: center; align-items: center; color: white; font-size: 60px; font-family: 'Pretendard', sans-serif; background-color: black;">
    초기화 중...
  </div>

  <script>
    // BroadcastChannel 생성 (left와 right 간 통신)
    const dlcChannel = new BroadcastChannel('dlc_channel');

    // 오디오 설정
    const powerOnSound = new Audio('./effect/poweron.mp3');
    const BGM1 = new Audio('./BGM/BGM1.mp3');
    BGM1.loop = true;
    const narration1 = new Audio('./narration/narration1.ogg');
    const collectSound = new Audio('./effect/collect.ogg');
    const clickSound = new Audio('./effect/click.mp3');

    // 데이터 수집 변수
    let recoveryRate = 0;
    let normalCount = 0;
    let advancedCount = 0;
    let premiumCount = 0;

    // 타이머 변수
    let section3Timer = null;

    // 복원률 및 개수 업데이트 함수
    function updateRecoveryDisplay() {
      document.getElementById('recoveryRate').textContent = recoveryRate;
      document.getElementById('normalCount').textContent = normalCount;
      document.getElementById('advancedCount').textContent = advancedCount;
      document.getElementById('premiumCount').textContent = premiumCount;
    }

    // section4로 전환하는 함수
    function goToSection4() {
      // 타이머 정리
      if (section3Timer) {
        clearTimeout(section3Timer);
        section3Timer = null;
      }

      // BGM1 정지
      BGM1.pause();
      BGM1.currentTime = 0;

      // right.html에 finpage 표시 메시지 전송
      dlcChannel.postMessage({ action: 'showFinpage' });

      // section3 숨기기
      document.getElementById('section3').style.display = 'none';

      // section4 표시 (로딩 화면)
      const section4 = document.getElementById('section4');
      const loadingImage = document.getElementById('loadingImage');

      section4.style.display = 'flex';
      loadingImage.style.display = 'block';

      console.log("Section 4 - Loading screen displayed");
    }

    // 최종 화면 표시 함수
    function showFinalScreen() {
      const loadingImage = document.getElementById('loadingImage');
      const finalScreen = document.getElementById('finalScreen');
      const finalScore = document.getElementById('finalScore');

      loadingImage.style.display = 'none';

      // 최종 점수 계산 (복원률 x 10)
      const finalPoints = recoveryRate * 10;
      finalScore.textContent = `${finalPoints} 점`;

      // 최종 화면 표시
      finalScreen.style.display = 'block';

      console.log(`Final screen displayed - Score: ${finalPoints}`);
    }

    // BroadcastChannel 메시지 수신
    dlcChannel.onmessage = (event) => {
      if (event.data.action === 'showFinalScreen') {
        console.log("Received showFinalScreen message from right.html");
        showFinalScreen();
      }
    };

    // Yes 버튼 클릭 이벤트
    $('#yesButton').click(function () {
      clickSound.currentTime = 0;
      clickSound.play();

      // 팝업 숨기기
      document.getElementById('slotPopup').style.display = 'none';

      // section4로 전환 (goToSection4 내부에서 BroadcastChannel 전송)
      goToSection4();
    });

    // No 버튼 클릭 이벤트
    $('#noButton').click(function () {
      clickSound.currentTime = 0;
      clickSound.play();

      // 팝업 숨기기
      document.getElementById('slotPopup').style.display = 'none';

      // pin40 다시 활성화
      pin40Activated = false;
    });
  </script>

    // 핀 액션 정의
    const pinActions_on = {
      "SLOTmega-2_pin_22": () => {
        if (!pin22Activated) {
          pin22Activated = true;
          console.log("Pin 22 activated - Power ON");

          // poweron 효과음 재생
          powerOnSound.play();

            triggerPinOn('SLOTmega-1_pin_22');
          }

          // BGM1 반복 재생

            BGM1.play();

        }
      },
      "SLOTmega-2_pin_23": () => {
        if (!pin23Activated) {
          pin23Activated = true;
          console.log("Pin 23 activated");
          // 여기에 pin 23 동작 추가
        }
      },
      "SLOTmega-2_pin_24": () => {
        if (!pin24Activated) {
          pin24Activated = true;
          console.log("Pin 24 activated - 특급");

          // collect 효과음 재생
          collectSound.currentTime = 0;
          collectSound.play();

          // 특급 데이터 수집 (복원률 10 증가)
          premiumCount++;
          recoveryRate += 10;
          updateRecoveryDisplay();

          // SLOTmega-1_pin_24 ON

            triggerPinOn('SLOTmega-1_pin_24');
          }
        }

      "SLOTmega-2_pin_25": () => {

          recoveryRate += 6;
          updateRecoveryDisplay();

          if (typeof triggerPinOn === 'function') {

          }

          }

          if (typeof triggerPinOn === 'function') {

          }
        }
      },
      "SLOTmega-2_pin_39": () => {
        if (!pin39Activated) {
          pin39Activated = true;
          pin39ActivatedCount++;
          console.log(`Pin 39 activated (count: ${pin39ActivatedCount})`);

          if (pin39ActivatedCount === 1) {
            // 첫 번째 감지: section1 (POWER OFF) 숨기기
            const section1 = document.getElementById('section1');
            section1.style.display = 'none';

            // section2 표시
            const section2 = document.getElementById('section2');
            section2.style.display = 'flex';

            // slot_text1 팝업 애니메이션으로 표시
            const slot_text1 = document.getElementById('slot_text1');
            const slot_text2 = document.getElementById('slot_text2');

            slot_text1.style.display = 'block';
            slot_text1.classList.add('popup-in');

            // narration1 재생
            narration1.play();

            // 5초 후 slot_text1 숨기고 slot_text2 표시
            setTimeout(() => {
              // slot_text1 팝업 아웃 애니메이션
              slot_text1.classList.remove('popup-in');
              slot_text1.classList.add('popup-out');

              // 애니메이션 완료 후 숨김
              setTimeout(() => {
                slot_text1.classList.remove('popup-out');
                slot_text1.style.display = 'none';

                slot_text2.style.display = 'block';
                slot_text2.classList.add('popup-in');
                pin39Activated = false;
              }, 200); // popup-out 애니메이션 시간과 일치
            }, 5000); // 나레이션 시간 5초 예상

          } else if (pin39ActivatedCount === 2) {
            // 두 번째 감지: section2 숨기고 section3 표시
            const section2 = document.getElementById('section2');
            const section3 = document.getElementById('section3');

            section2.style.display = 'none';
            section3.style.display = 'flex';

            console.log("Section3 (slot_mainpage) displayed");

            // 10분 타이머 시작 (600,000ms)
            section3Timer = setTimeout(() => {
              goToSection4();
            }, 600000);
          }
        }
      },
      "SLOTmega-2_pin_40": () => {
        if (!pin40Activated) {
          pin40Activated = true;
          console.log("Pin 40 activated - Show popup");

          // click 효과음 재생
          clickSound.currentTime = 0;
          clickSound.play();

          // 팝업 표시
          const slotPopup = document.getElementById('slotPopup');
          slotPopup.style.display = 'flex';
        }
      },
      "SLOTmega-2_pin_41": () => {
        if (!pin41Activated) {
          pin41Activated = true;
          console.log("Pin 41 activated");
          // 여기에 pin 41 동작 추가
        }
      }
    };

    // 핀 상태 업데이트 함수 (test)
    // function updatePinDisplay(pinIdentifier) {
    //   if (pinActions_on[pinIdentifier] && window[pinIdentifier] === true) {

    // 핀 상태 업데이트 함수 (real)
    function updatePinDisplay(pinIdentifier) {
      if (!isInitialized) return; // 초기화 전에는 신호 무시

      if (window[pinIdentifier] === true) {
        if (pinActions_on[pinIdentifier]) {
          pinActions_on[pinIdentifier]();
        }
      }
    }

    // 초기화 화면 클릭 이벤트
    $('#section0').click(function () {
      isInitialized = true; // 초기화 완료
      section0.style.display = "none";

      // section1 (POWER OFF 깜박임) 표시
      const section1 = document.getElementById('section1');
      section1.style.display = 'flex';
    });

    // 숨겨진 리셋 버튼 기능
    let resetClickCount = 0;
    let isResetting = false;
    $('#hiddenResetButton').click(function () {
      if (isResetting) return; // 리셋 중이면 무시

      resetClickCount++;
      console.log(`Reset button clicked: ${resetClickCount}/10`);

      if (resetClickCount >= 10) {
        isResetting = true;
        // 모든 섹션 숨기고 section5 표시
        document.getElementById('section0').style.display = 'none';
        document.getElementById('section1').style.display = 'none';
        document.getElementById('section2').style.display = 'none';
        document.getElementById('section3').style.display = 'none';
        document.getElementById('section4').style.display = 'none';
        document.getElementById('section5').style.display = 'flex';

        // BGM 정지
        BGM1.pause();
        BGM1.currentTime = 0;

        // 모든 SLOTmega-1 핀 22~41 끄기 (1초에 5개씩)
        const pinsToTurnOff = [];
        for (let i = 22; i <= 41; i++) {
          pinsToTurnOff.push(i);
        }

        let currentIndex = 0;
        const turnOffInterval = setInterval(() => {
          // 5개씩 끄기
          for (let j = 0; j < 5 && currentIndex < pinsToTurnOff.length; j++) {
            const pinNumber = pinsToTurnOff[currentIndex];
            if (typeof triggerPinOff === 'function') {
              triggerPinOff(`SLOTmega-1_pin_${pinNumber}`);
              console.log(`Turning off pin ${pinNumber}`);
            }
            currentIndex++;
          }

          // 모든 핀을 껐으면 새로고침
          if (currentIndex >= pinsToTurnOff.length) {
            clearInterval(turnOffInterval);
            console.log("All pins turned off. Refreshing page...");

            // dlcChannel로 새로고침 신호 전송
            dlcChannel.postMessage({ action: 'reload' });

            setTimeout(() => {
              location.reload();
            }, 1000);
          }
        }, 1000);
      }
    });
